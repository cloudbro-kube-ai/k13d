# k13d MCP Server Configuration Example
# File: ~/.config/k13d/config.yaml
#
# This example shows how to configure the Kubernetes MCP server for k13d
# The mcp-server-kubernetes provides tools for Kubernetes resource management
# and inspection within the AI agent loop

mcp:
  servers:
    # Sequential Thinking MCP Server
    # Provides step-by-step reasoning for complex problem solving
    - name: sequential-thinking
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-sequential-thinking"
      description: "Decompose tasks into logical steps with sequential thinking"
      enabled: false

    # Kubernetes MCP Server (Main Example)
    # Provides tools for Kubernetes resource management
    - name: kubernetes
      command: npx
      args:
        - -y
        - "@anthropic/mcp-server-kubernetes"
      env:
        # Uses default kubeconfig location (~/.kube/config)
        KUBECONFIG: ""
        # Optional: Set specific context
        # KUBECTL_CONTEXT: "docker-desktop"
        # Optional: Set default namespace
        # KUBECTL_NAMESPACE: "default"
      description: "Kubernetes resource management and inspection tools"
      enabled: true

    # Example: Custom SQL Database Server
    # Query Kubernetes cluster data using SQL queries
    # Requires database setup with K8s cluster export
    # - name: kubernetes-db
    #   command: npx
    #   args:
    #     - -y
    #     - "@modelcontextprotocol/server-postgres"
    #   env:
    #     DATABASE_URL: "postgresql://user:password@localhost:5432/k8s_db"
    #   description: "SQL queries for Kubernetes cluster data"
    #   enabled: false

    # Example: GitHub MCP Server
    # Requires GITHUB_TOKEN environment variable
    # - name: github
    #   command: npx
    #   args:
    #     - -y
    #     - "@modelcontextprotocol/server-github"
    #   env:
    #     GITHUB_TOKEN: "${GITHUB_TOKEN}"  # Set via environment variable
    #   description: "GitHub repository management and code search"
    #   enabled: false

    # Example: Filesystem MCP Server
    # Provides read/write access to files in specified directory
    # - name: filesystem
    #   command: npx
    #   args:
    #     - -y
    #     - "@modelcontextprotocol/server-filesystem"
