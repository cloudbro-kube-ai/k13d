# Example Usage with k13d

# 1. Start k13d with Web UI
#    $ k13d -web -port 8080
#
# 2. Navigate to Settings > MCP Servers
#    - View list of registered MCP servers
#    - See connection status (connected/disconnected)
#    - View available tools from each server
#
# 3. Enable MCP Server in Web UI
#    - Toggle "enabled" for kubernetes server
#    - Click "Save" to establish connection
#    - Verify "Status" shows "connected"
#
# 4. Use in AI Chat
#    In the AI assistant chat:
#    - Ask: "List all pods in the default namespace"
#      → Uses kubernetes MCP server's get_pods tool
#    - Ask: "Show me the logs for the nginx pod"
#      → Uses get_logs tool
#    - Ask: "Apply this deployment manifest: ..."
#      → Uses apply_manifest tool

# Tools Available from mcp-server-kubernetes:
# - get_pods(namespace) - List pods
# - get_deployments(namespace) - List deployments
# - get_statefulsets(namespace) - List StatefulSets
# - get_daemonsets(namespace) - List DaemonSets
# - get_jobs(namespace) - List Jobs
# - describe_pod(namespace, name) - Get pod details
# - describe_deployment(namespace, name) - Get deployment details
# - get_logs(namespace, pod_name) - Get pod logs
# - apply_manifest(yaml) - Apply YAML manifest
# - delete_resource(kind, namespace, name) - Delete resource
# - get_events(namespace) - Get cluster events
# - port_forward(namespace, pod_name, port) - Forward ports
# - get_resource_status(kind, namespace) - Get resource status
