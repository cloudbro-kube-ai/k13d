# .golangci.yml - k13d linter configuration (v2 format)
# Phase 1: Conservative set of high-value, low-noise linters
version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Tier 1: Core linters
    - errcheck
    - govet
    - staticcheck    # includes gosimple in v2
    - unused
    - ineffassign
    # Tier 2: Additional quality checks
    - revive
    - misspell
    - gocritic

  settings:
    errcheck:
      exclude-functions:
        # HTTP handler response writes - errors handled by net/http
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
        # Cleanup operations where errors are non-actionable
        - os.Remove
        - os.RemoveAll
        - (*os.File).Close
        - (io.Closer).Close
        - (*net.TCPListener).Close
      check-type-assertions: false
      check-blank: false

    staticcheck:
      checks:
        - "all"
        - "-QF*"        # Disable quickfix suggestions (style, not bugs)
        - "-ST*"        # Disable stylecheck (package comments etc, covered by revive)

    govet:
      enable:
        - printf
        - structtag
        - assign
        - bools
        - buildtag
        - copylocks
        - httpresponse
        - loopclosure
        - lostcancel
        - nilfunc
        - unreachable

    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: superfluous-else

    # misspell: no locale restriction to avoid British/American false positives

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - appendAssign
        - ifElseChain
        - sprintfQuotedString
        - exitAfterDefer
        - commentedOutCode
        - singleCaseSwitch

  exclusions:
    presets: []
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - revive

      - path: ^tests/mocks/
        linters:
          - errcheck
          - revive
          - gocritic

      - path: tui_test_harness\.go
        linters:
          - errcheck

      - path: tui_test_fixtures\.go
        linters:
          - errcheck
          - revive

      # Exclude defer Close() patterns from errcheck
      - text: "Error return value of .+\\.Close"
        linters:
          - errcheck

      # Exclude resp.Body.Close from errcheck
      - text: "Error return value of .+Body\\.Close"
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
